function ri(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function round2(n){return Math.round(n*100)/100;}

const RAIZES_Q=[4,9,16,25,36,49,64,81,100,121,144,169,196,225,256];
const RAIZES_C=[8,27,64,125,216,343,1000];

function gerarQuestao(level,tema){
  let enunciado,resposta,choices,emoji,dica="";

  if(tema==="raiz_q"){
    if(level===0){
      const idx=ri(0,8);
      const r=RAIZES_Q[idx];
      const sq=Math.sqrt(r);
      enunciado=`Qual e a raiz quadrada exata de ${r}?`;
      resposta=sq; emoji="√"; dica=`${sq} x ${sq} = ${r}`;
    } else if(level===1){
      const idx=ri(0,RAIZES_Q.length-1);
      const r=RAIZES_Q[idx];
      const sq=Math.round(Math.sqrt(r));
      enunciado=`Calcule: √${r} + √${RAIZES_Q[Math.min(idx+1,RAIZES_Q.length-1)]}`;
      const r2=RAIZES_Q[Math.min(idx+1,RAIZES_Q.length-1)];
      resposta=sq+Math.round(Math.sqrt(r2));
      emoji="√"; dica=`√${r}=${sq}, √${r2}=${Math.round(Math.sqrt(r2))}`;
    } else {
      const l=ri(3,12);
      enunciado=`Um quadrado tem area de ${l*l} m². Qual e o lado?`;
      resposta=l; emoji="◼"; dica=`lado = √${l*l}`;
    }
  } else if(tema==="raiz_c"){
    if(level===0){
      const idx=ri(0,RAIZES_C.length-1);
      const r=RAIZES_C[idx];
      const cr=Math.round(Math.cbrt(r));
      enunciado=`Qual e a raiz cubica exata de ${r}?`;
      resposta=cr; emoji="∛"; dica=`${cr} x ${cr} x ${cr} = ${r}`;
    } else if(level===1){
      const idx=ri(0,4);
      const r=RAIZES_C[idx];
      const cr=Math.round(Math.cbrt(r));
      enunciado=`Calcule: ∛${r} x 2`;
      resposta=cr*2; emoji="∛"; dica=`∛${r} = ${cr}, entao ${cr} x 2`;
    } else {
      const a=ri(2,7);
      enunciado=`Um cubo tem volume de ${a*a*a} cm³. Qual e a aresta?`;
      resposta=a; emoji="📦"; dica=`aresta = ∛${a*a*a}`;
    }
  } else if(tema==="aplic"){
    const casos=[
      // Facil
      {e:"Uma sala quadrada tem area de 81 m². Qual e a medida do lado?",r:9,em:"🏠",d:"lado = √81"},
      {e:"Um azulejo quadrado tem area de 25 cm². Qual e o comprimento do lado?",r:5,em:"🔲",d:"lado = √25"},
      {e:"Uma tela quadrada tem area de 64 cm². Qual e o seu lado?",r:8,em:"📺",d:"lado = √64"},
      // Medio
      {e:"Uma piscina quadrada tem area de 144 m². Qual e o seu lado?",r:12,em:"🏊",d:"lado = √144 = 12"},
      {e:"Um terreno quadrado tem area de 196 m². Qual e a medida do lado?",r:14,em:"🌳",d:"lado = √196 = 14"},
      {e:"Uma placa quadrada tem area de 225 cm². Qual e o seu lado?",r:15,em:"🪟",d:"lado = √225 = 15"},
      // Dificil
      {e:"Um jardim quadrado tem perimetro de 48 m. Qual e a sua area?",r:144,em:"🌺",d:"P=48, lado=12, A=12²=144"},
      {e:"Se dobramos o lado de um quadrado, sua area multiplica por quanto?",r:4,em:"◼",d:"Novo lado = 2L, nova area = 4L²"},
    ];
    const idx=level===0?ri(0,2):level===1?ri(3,5):ri(6,7);
    const c=casos[idx];
    enunciado=c.e; resposta=c.r; emoji=c.em; dica=c.d;
  } else { // pitagoras
    const trips=[[3,4,5],[5,12,13],[6,8,10],[8,15,17],[9,12,15],[7,24,25]];
    const t=trips[ri(0,trips.length-1)];
    if(level===0){
      enunciado=`Num triangulo retangulo com catetos ${t[0]} e ${t[1]}, qual e a hipotenusa?`;
      resposta=t[2]; emoji="▲"; dica=`h = √(${t[0]}² + ${t[1]}²) = √(${t[0]*t[0]+t[1]*t[1]})`;
    } else if(level===1){
      enunciado=`Num triangulo retangulo, a hipotenusa e ${t[2]} e um cateto e ${t[0]}. Qual e o outro cateto?`;
      resposta=t[1]; emoji="▲"; dica=`b = √(${t[2]}² - ${t[0]}²) = √(${t[2]*t[2]-t[0]*t[0]})`;
    } else {
      const mult=ri(2,4);
      enunciado=`Num triangulo retangulo com catetos ${t[0]*mult} e ${t[1]*mult}, qual e a hipotenusa?`;
      resposta=t[2]*mult; emoji="▲"; dica=`Triangulo ${t[0]}-${t[1]}-${t[2]} multiplicado por ${mult}`;
    }
  }

  // Alternativas
  const ws=[];let att=0;
  while(ws.length<3&&att<80){
    att++;
    const delta=Math.max(1,ri(1,Math.max(2,Math.floor(Math.abs(resposta)*0.3)||2)));
    const sign=Math.random()<0.5?1:-1;
    const w=round2(resposta+sign*delta);
    if(w!==resposta&&w>0&&!ws.includes(w))ws.push(w);
  }
  const ch=[...ws,resposta].sort(()=>Math.random()-0.5);
  return{enunciado,resposta,choices:ch,emoji,tema,dica};
}

                  </div>
                  <div style={{display:"flex",gap:4,marginBottom:7,flexWrap:"wrap"}}>
                    {s.history&&s.history.map((h,j)=>(
                      <div key={j} style={{width:24,height:24,borderRadius:5,background:h.result==="correct"?`${COR}25`:"rgba(248,113,113,0.15)",border:`1px solid ${h.result==="correct"?COR:"#f87171"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10}}>
                        {h.result==="correct"?"✅":"❌"}
                      </div>
                    ))}
                  </div>
                  <button onClick={()=>doPrint({...s,selTemas:s.selTemas||["raiz_q","raiz_c","aplic","pitag"]})} style={{width:"100%",padding:"7px",borderRadius:8,border:`1px solid ${COR}30`,background:`${COR}08`,color:COR,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>
                    🖨️ Imprimir Resultado desta Sessao
                  </button>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function Footer(){
  return(
    <footer style={{width:"100%",maxWidth:520,marginTop:16,borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:11,paddingBottom:7,textAlign:"center",position:"relative",zIndex:1}}>
      <div style={{display:"flex",flexDirection:"column",gap:3,alignItems:"center"}}>
        <span style={{color:COR,fontSize:12,fontWeight:700,fontFamily:"'Syne',sans-serif"}}>👩‍🎓 {CREDITS.nome}</span>
        <span style={{color:"#444",fontSize:10}}>{CREDITS.curso} · {CREDITS.disciplina}</span>
        <span style={{color:"#444",fontSize:10}}>{CREDITS.orientador} · {CREDITS.regente}</span>
        <span style={{color:"#333",fontSize:9}}>{CREDITS.nivel} · Deus e tudo que nos temos ✝</span>
      </div>
    </footer>
  );
}

function App(){
  const[screen,setScreen]=useState("menu");
  const[level,setLevel]=useState(0);
  const[selTemas,setSelTemas]=useState(["raiz_q","raiz_c","aplic","pitag"]);
  const[question,setQuestion]=useState(null);
  const[score,setScore]=useState(0);
  const[livesLeft,setLivesLeft]=useState(3);
  const[round,setRound]=useState(0);
  const[timeLeft,setTimeLeft]=useState(45);
  const[feedback,setFeedback]=useState(null);
  const[answered,setAnswered]=useState(false);
  const[streak,setStreak]=useState(0);
  const[maxStreak,setMaxStreak]=useState(0);
  const[bestScore,setBestScore]=useState(0);
  const TOTAL=10;
  const[studentName,setStudentName]=useState("");
  const[correctCount,setCorrectCount]=useState(0);
  const[wrongCount,setWrongCount]=useState(0);
  const[finalScore,setFinalScore]=useState(0);
  const[showBncc,setShowBncc]=useState(false);
  const[history,setHistory]=useState([]);
  const[sessionDate,setSessionDate]=useState("");
  const[shake,setShake]=useState(false);

  const pickQ=useCallback(()=>{
    const tema=selTemas[Math.floor(Math.random()*selTemas.length)];
    return gerarQuestao(level,tema);
  },[level,selTemas]);

  useEffect(()=>{
    if(screen!=="game"||answered)return;
    if(timeLeft<=0){handleAnswer(null);return;}
    const t=setTimeout(()=>setTimeLeft(v=>v-1),1000);
    return()=>clearTimeout(t);
  },[timeLeft,screen,answered]);

  function startGame(){
    if(!studentName.trim()||selTemas.length===0)return;
    setScore(0);setLivesLeft(3);setRound(0);setStreak(0);setMaxStreak(0);
    setCorrectCount(0);setWrongCount(0);setHistory([]);
    const now=new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
    setSessionDate(now);
    const q=pickQ();setQuestion(q);setTimeLeft(LEVELS[level].timeLimit);
    setFeedback(null);setAnswered(false);setScreen("game");
  }

  function handleAnswer(choice){
    if(answered)return;
    setAnswered(true);
    const ok=choice!==null&&String(choice)===String(question.resposta);
    let ns=score,nl=livesLeft,nst=streak,nms=maxStreak,nc=correctCount,nw=wrongCount;
    if(ok){nst++;if(nst>nms)nms=nst;const bonus=nst>=3?Math.floor(LEVELS[level].points*0.5):0;ns+=LEVELS[level].points+bonus;nc++;setFeedback("correct");}
    else{nst=0;nl--;nw++;setFeedback("wrong");setShake(true);setTimeout(()=>setShake(false),500);}
    setStreak(nst);setMaxStreak(nms);setScore(ns);setLivesLeft(nl);setCorrectCount(nc);setWrongCount(nw);
    const newHist=[...history,{...question,result:ok?"correct":"wrong"}];
    setHistory(newHist);
    setTimeout(()=>{
      const nr=round+1;
      if(nr>=TOTAL||nl<=0){
        setBestScore(b=>Math.max(b,ns));setFinalScore(ns);
        const sessao={studentName,finalScore:ns,correctCount:nc,wrongCount:nw,maxStreak:nms,level,levelName:LEVELS[level].name,selTemas,history:newHist,TOTAL,date:sessionDate};
        const h=loadH();h.push(sessao);saveH(h);setScreen("result");
      }else{setRound(nr);const q=pickQ();setQuestion(q);setTimeLeft(LEVELS[level].timeLimit);setFeedback(null);setAnswered(false);}
    },1500);
  }

  function toggleTema(t){setSelTemas(ts=>ts.includes(t)?(ts.length>1?ts.filter(x=>x!==t):ts):[...ts,t]);}
  function copyLink(){navigator.clipboard.writeText(window.location.href).then(()=>alert("✅ Link copiado!"));}
  if(screen==="historico") return <TelaHistorico onBack={()=>setScreen("menu")}/>;

  const tInfo=question?TEMAS.find(t=>t.id===question.tema):null;
  const timerPct=question?(timeLeft/LEVELS[level].timeLimit)*100:100;
  const timerCol=timerPct>50?COR:timerPct>25?"#f59e0b":"#f43f5e";
  const canStart=studentName.trim()&&selTemas.length>0;
  const base={minHeight:"100vh",background:BG,fontFamily:"'DM Sans',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",padding:16,position:"relative",zIndex:1};

  if(screen==="menu") return(
    <div style={{...base,justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:480,textAlign:"center"}} className="slide-up">
        <div style={{background:`${COR}08`,border:`1px solid ${COR}18`,borderRadius:16,padding:14,marginBottom:14,textAlign:"left"}}>
          <p style={{color:COR,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,marginBottom:10,textAlign:"center",fontFamily:"'Syne',sans-serif"}}>✝️ Deus e tudo que nos temos</p>
          {VERSICULOS.map((v,i)=>(
            <div key={i} style={{borderLeft:`2px solid ${COR}50`,paddingLeft:10,marginBottom:8}}>
              <p style={{color:"#6ee7b7",fontSize:11,lineHeight:1.65,margin:"0 0 2px",fontStyle:"italic"}}>{v.txt}</p>
              <p style={{color:COR,fontSize:10,fontWeight:700,margin:0,fontFamily:"'Syne',sans-serif"}}>— {v.ref}</p>
            </div>
          ))}
        </div>
        <div style={{background:GRAD,borderRadius:16,padding:"14px 20px",marginBottom:14,textAlign:"center"}}>
          <div style={{fontSize:44,marginBottom:4,filter:`drop-shadow(0 0 16px ${COR}80)`}}>√</div>
          <h1 style={{fontSize:28,fontWeight:900,color:"#fff",margin:"0 0 3px",letterSpacing:-1,fontFamily:"'Syne',sans-serif"}}>Radiciacao <span style={{color:"#fbbf24"}}>Ninja</span></h1>
          <p style={{color:"rgba(255,255,255,0.8)",fontSize:12,margin:0}}>8o Ano · 2o Bimestre · BNCC EF08MA03</p>
          {bestScore>0&&<p style={{color:"#fbbf24",fontSize:11,marginTop:4}}>🏆 Recorde: {bestScore} pts</p>}
        </div>
        <div style={{display:"flex",gap:7,marginBottom:12}}>
          <button onClick={copyLink} style={{flex:1,padding:"9px",borderRadius:11,border:"none",background:GRAD,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>🔗 Copiar Link</button>
          <button onClick={()=>setScreen("historico")} style={{flex:1,padding:"9px",borderRadius:11,border:`1px solid ${COR}30`,background:`${COR}10`,color:COR,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>📊 Historico ({loadH().length})</button>
        </div>
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:13,padding:13,marginBottom:11,textAlign:"left"}}>
          <p style={{color:COR,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:7,fontFamily:"'Syne',sans-serif"}}>📋 Sobre o App</p>
          <p style={{color:"#aaa",fontSize:12,lineHeight:1.7,margin:"0 0 8px"}}>O <strong style={{color:"#fff"}}>Radiciacao Ninja</strong> cobre os conteudos de <strong style={{color:COR}}>Radicacao</strong> do 2o Bimestre: raiz quadrada, raiz cubica, aplicacoes geometricas e Teorema de Pitagoras.</p>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {TEMAS.map((t,i)=>(
              <span key={i} style={{background:`${t.color}15`,border:`1px solid ${t.color}30`,borderRadius:99,padding:"3px 10px",color:t.color,fontSize:10,fontWeight:700}}>{t.emoji} {t.label}</span>
            ))}
          </div>
        </div>
        <button onClick={()=>setShowBncc(v=>!v)} style={{background:`${COR}10`,border:`1px solid ${COR}25`,borderRadius:99,padding:"4px 14px",color:COR,fontSize:11,fontWeight:700,cursor:"pointer",marginBottom:10,fontFamily:"'Syne',sans-serif"}}>
          📚 BNCC {BNCC.cod} {showBncc?"▲":"▼"}
        </button>
        {showBncc&&(
          <div style={{background:`${COR}06`,border:`1px solid ${COR}15`,borderRadius:12,padding:12,marginBottom:11,textAlign:"left"}}>
            <p style={{color:COR,fontSize:10,fontWeight:700,marginBottom:4}}>{BNCC.campo} · {BNCC.ano}</p>
            <p style={{color:"#555",fontSize:11,lineHeight:1.5}}>{BNCC.desc}</p>
          </div>
        )}
        <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:11,padding:11,marginBottom:8}}>
          <p style={{color:"#555",fontSize:10,marginBottom:5,textTransform:"uppercase",letterSpacing:1.5,fontWeight:600}}>Nome do Aluno(a)</p>
          <input type="text" placeholder="Digite seu nome completo..." value={studentName} onChange={e=>setStudentName(e.target.value)}
            style={{width:"100%",padding:"9px 11px",borderRadius:7,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:"#fff",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
        </div>
        <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:11,padding:11,marginBottom:8}}>
          <p style={{color:"#555",fontSize:10,marginBottom:5,textTransform:"uppercase",letterSpacing:1.5,fontWeight:600}}>Nivel de Dificuldade</p>
          <div style={{display:"flex",gap:6}}>
            {LEVELS.map((l,i)=>(
              <button key={i} onClick={()=>setLevel(i)} style={{flex:1,padding:"8px 3px",borderRadius:8,border:level===i?`2px solid ${COR}`:"2px solid transparent",background:level===i?`${COR}18`:"rgba(255,255,255,0.03)",color:level===i?COR:"#555",cursor:"pointer",fontWeight:700,fontSize:11,transition:"all 0.2s",fontFamily:"'Syne',sans-serif"}}>
                {l.name}<div style={{fontSize:8,marginTop:1,opacity:.7}}>{l.label}</div>
              </button>
            ))}
          </div>
        </div>
        <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:11,padding:11,marginBottom:14}}>
          <p style={{color:"#555",fontSize:10,marginBottom:5,textTransform:"uppercase",letterSpacing:1.5,fontWeight:600}}>Temas de Radicacao</p>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {TEMAS.map(t=>(
              <button key={t.id} onClick={()=>toggleTema(t.id)} style={{flex:1,minWidth:80,padding:"9px 4px",borderRadius:8,border:selTemas.includes(t.id)?`2px solid ${t.color}`:"2px solid transparent",background:selTemas.includes(t.id)?`${t.color}15`:"rgba(255,255,255,0.03)",color:selTemas.includes(t.id)?t.color:"#555",cursor:"pointer",fontWeight:700,fontSize:13,transition:"all 0.2s"}}>
                <div style={{fontSize:16,marginBottom:2}}>{t.emoji}</div>
                <div style={{fontSize:8}}>{t.label}</div>
              </button>
            ))}
          </div>
        </div>
        <button onClick={startGame} disabled={!canStart} style={{width:"100%",padding:"13px",borderRadius:11,border:"none",background:canStart?GRAD:"rgba(99,99,99,0.2)",color:canStart?"#fff":"#333",fontSize:15,fontWeight:900,cursor:canStart?"pointer":"not-allowed",fontFamily:"'Syne',sans-serif",transition:"all 0.3s",boxShadow:canStart?`0 8px 24px ${COR}40`:"none"}}>
          √ Comecar Jogo
        </button>
        {!studentName.trim()&&<p style={{color:"#f87171",fontSize:10,marginTop:4}}>⚠️ Digite seu nome para comecar</p>}
        <p style={{color:"#333",fontSize:10,marginTop:5}}>{TOTAL} rodadas · {LEVELS[level].timeLimit}s por questao · 💾 salvo automaticamente</p>
      </div>
      <Footer/>
    </div>
  );

  if(screen==="result"){
    const pct=Math.round((correctCount/TOTAL)*100);
    const nota=(correctCount/TOTAL)*10;
    const medal=nota>=9?"🏆 Excelente!":nota>=7?"🥈 Muito Bom!":nota>=5?"🥉 Bom trabalho!":"💪 Continue tentando!";
    const icon=nota>=9?"🏆":nota>=7?"🥈":nota>=5?"🥉":"💪";
    return(
      <div style={{...base,justifyContent:"center"}}>
        <div style={{width:"100%",maxWidth:460}} className="slide-up">
          <div style={{textAlign:"center",marginBottom:12}}>
            <div style={{fontSize:44,marginBottom:4}}>{icon}</div>
            <h2 style={{color:"#fff",fontSize:20,fontWeight:900,margin:"0 0 3px",fontFamily:"'Syne',sans-serif"}}>{medal}</h2>
            <p style={{color:COR,fontSize:13,fontWeight:700}}>👤 {studentName}</p>
            <p style={{color:"#444",fontSize:11}}>8o Ano · BNCC {BNCC.cod} · {sessionDate}</p>
            <p style={{color:COR,fontSize:11,marginTop:3}}>💾 Sessao salva no historico!</p>
          </div>
          <div style={{background:GRAD,borderRadius:14,padding:"13px 18px",marginBottom:11,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{color:"rgba(255,255,255,0.6)",fontSize:9,textTransform:"uppercase",letterSpacing:1}}>Nota</div>
              <div style={{color:"#fff",fontSize:34,fontWeight:900,lineHeight:1,fontFamily:"'Syne',sans-serif"}}>{nota.toFixed(1)}</div>
              <div style={{color:"rgba(255,255,255,0.6)",fontSize:9}}>/10,0</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{color:"rgba(255,255,255,0.6)",fontSize:9,textTransform:"uppercase",letterSpacing:1}}>Pontuacao</div>
              <div style={{color:"#fbbf24",fontSize:24,fontWeight:900,fontFamily:"'Syne',sans-serif"}}>{finalScore} pts</div>
              <div style={{color:"rgba(255,255,255,0.6)",fontSize:9}}>Aproveitamento: {pct}%</div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:11}}>
            {[{label:"Acertos",value:correctCount+" ✅",color:COR},{label:"Erros",value:wrongCount+" ❌",color:"#f87171"},{label:"Seq. max.",value:maxStreak+" 🔥",color:"#fbbf24"},{label:"Recorde",value:bestScore+" pts",color:"#34d399"}].map((s,i)=>(
              <div key={i} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:9,padding:10}}>
                <div style={{color:"#444",fontSize:9,textTransform:"uppercase",letterSpacing:1}}>{s.label}</div>
                <div style={{color:s.color,fontSize:16,fontWeight:800,marginTop:2,fontFamily:"'Syne',sans-serif"}}>{s.value}</div>
              </div>
            ))}
          </div>
          <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:11,marginBottom:11}}>
            <p style={{color:"#555",fontSize:9,textTransform:"uppercase",letterSpacing:1.5,marginBottom:7}}>Questoes desta sessao</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {history.map((h,i)=>(
                <div key={i} style={{width:28,height:28,borderRadius:6,background:h.result==="correct"?`${COR}25`:"rgba(248,113,113,0.15)",border:`1px solid ${h.result==="correct"?COR:"#f87171"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11}}>
                  {h.result==="correct"?"✅":"❌"}
                </div>
              ))}
            </div>
          </div>
          <div style={{display:"flex",gap:6,marginBottom:6}}>
            <button onClick={startGame} style={{flex:1,padding:10,borderRadius:10,border:"none",background:GRAD,color:"#fff",fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>🔄 Jogar Novamente</button>
            <button onClick={()=>setScreen("menu")} style={{flex:1,padding:10,borderRadius:10,border:"1px solid rgba(255,255,255,0.08)",background:"transparent",color:"#555",fontSize:12,fontWeight:700,cursor:"pointer"}}>🏠 Menu</button>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>doPrint({studentName,finalScore,correctCount,wrongCount,maxStreak,level,selTemas,history,TOTAL,date:sessionDate})} style={{flex:2,padding:10,borderRadius:10,border:`1px solid ${COR}30`,background:`${COR}08`,color:COR,fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>🖨️ Imprimir Resultado</button>
            <button onClick={()=>setScreen("historico")} style={{flex:1,padding:10,borderRadius:10,border:"1px solid rgba(251,191,36,0.3)",background:"rgba(251,191,36,0.08)",color:"#fbbf24",fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>📊 Historico</button>
          </div>
        </div>
        <Footer/>
      </div>
    );
  }

  return(
    <div style={{...base,paddingTop:10}}>
      <div style={{width:"100%",maxWidth:480,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
        <div style={{display:"flex",gap:2}}>{[...Array(3)].map((_,i)=><span key={i} style={{fontSize:17,opacity:i<livesLeft?1:0.2}}>❤️</span>)}</div>
        <div style={{textAlign:"center"}}>
          <div style={{color:COR,fontSize:9,fontWeight:600,fontFamily:"'Syne',sans-serif"}}>👤 {studentName}</div>
          <div style={{color:COR,fontSize:16,fontWeight:900,lineHeight:1,fontFamily:"'Syne',sans-serif",textShadow:`0 0 16px ${COR}60`}}>{score} pts</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{color:"#555",fontSize:11,fontWeight:700,fontFamily:"'Syne',sans-serif"}}>{round+1}/{TOTAL}</div>
          <div style={{color:"#333",fontSize:9}}>rodada</div>
        </div>
      </div>
      <div style={{width:"100%",maxWidth:480,height:4,background:"rgba(255,255,255,0.05)",borderRadius:99,marginBottom:8,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${timerPct}%`,background:timerCol,borderRadius:99,transition:"width 1s linear"}}/>
      </div>
      {streak>=2&&(
        <div style={{background:`${COR}10`,border:`1px solid ${COR}25`,borderRadius:99,padding:"3px 12px",color:COR,fontSize:11,fontWeight:700,marginBottom:7,fontFamily:"'Syne',sans-serif"}}>
          🔥 Sequencia: {streak}x {streak>=3?`· +${Math.floor(LEVELS[level].points*0.5)} bonus!`:""}
        </div>
      )}
      {question&&(
        <div style={{width:"100%",maxWidth:480,flex:1,display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:6}}>
            {tInfo&&(
              <div style={{display:"inline-flex",alignItems:"center",gap:4,background:`${tInfo.color}12`,border:`1px solid ${tInfo.color}30`,borderRadius:99,padding:"2px 10px"}}>
                <span style={{fontSize:12}}>{tInfo.emoji}</span>
                <span style={{color:tInfo.color,fontSize:10,fontWeight:700,fontFamily:"'Syne',sans-serif"}}>{tInfo.label}</span>
              </div>
            )}
            <div style={{marginLeft:"auto",color:timerCol,fontSize:13,fontWeight:800,fontFamily:"'Syne',sans-serif"}}>{timeLeft}s</div>
          </div>
          <div className={shake?"shake":""} style={{background:"rgba(255,255,255,0.04)",border:feedback==="correct"?`2px solid ${COR}`:feedback==="wrong"?`2px solid #f87171`:`1px solid rgba(255,255,255,0.07)`,borderRadius:18,padding:"16px 14px",marginBottom:9,textAlign:"center",transition:"border-color 0.3s",flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}}>
            <div style={{fontSize:32,marginBottom:8,filter:`drop-shadow(0 0 12px ${COR}50)`}}>{question.emoji}</div>
            <p style={{color:"#ccc",fontSize:14,lineHeight:1.75,margin:"0 0 6px"}}>{question.enunciado}</p>
            {question.dica&&!feedback&&<p style={{color:"#333",fontSize:11,fontStyle:"italic"}}>💡 {question.dica}</p>}
            {feedback&&(
              <div style={{marginTop:7,fontSize:12,fontWeight:700,color:feedback==="correct"?COR:"#f87171",fontFamily:"'Syne',sans-serif"}}>
                {feedback==="correct"?"✅ Correto! Muito bem!":"❌ Resposta: "+question.resposta}
              </div>
            )}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:5}}>
            {question.choices.map((c,i)=>{
              const isC=String(c)===String(question.resposta);
              let bg="rgba(255,255,255,0.04)",border="1px solid rgba(255,255,255,0.08)";
              if(answered&&isC){bg=`${COR}20`;border=`2px solid ${COR}`;}
              if(answered&&!isC){bg="rgba(248,113,113,0.06)";border="1px solid rgba(248,113,113,0.15)";}
              return(
                <button key={i} onClick={()=>handleAnswer(c)} disabled={answered}
                  style={{padding:"14px 7px",borderRadius:12,border,background:bg,color:answered&&isC?COR:"#ccc",fontSize:17,fontWeight:900,cursor:answered?"default":"pointer",transition:"all 0.2s",fontFamily:"'Syne',sans-serif"}}>
                  {c}
                </button>
              );
            })}
          </div>
        </div>
      )}
      <Footer/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
